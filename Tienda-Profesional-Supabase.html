<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <title>Tienda Profesional - Pedido WhatsApp (Con Supabase)</title>
 <link rel="stylesheet" href="stylesTPWP.css">
 
 <!-- ============================================
      CAMBIO 1/3: AGREGAR LIBRERÍA DE SUPABASE
      Se importa el cliente de Supabase desde CDN
      para poder consultar la base de datos.
      ============================================ -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
 <h1 style="text-align:center; color:#2c3e50;">👟 Reparadora de Calzados</h1>
 
 <!-- Catálogo -->
 <div id="grid-productos">Cargando productos...</div>
 
 <!-- Carrito -->
 <div id="carrito-container">
 <h2 style="margin-top:0;">🛒 Tu Pedido</h2>
 <div id="lista-carrito-items"></div>
 <div style="text-align: right; margin-top: 15px; font-size: 1.2rem;">
 Total: <strong style="color:#27ae60;">$<span id="total-precio">0</span></strong>
 </div>
 
 <!-- Botones de Acción -->
 <button class="btn-whatsapp" onclick="pedirPorWhatsApp()">
<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.022 1.051 3.638 1.051.994.001 2.486-.435 3.48-1.43.994-.994 1.43-2.486 1.43-3.48.001-.616-.056-1.962-1.051-3.638-1.043-1.752-2.378-3.087-4.13-4.13-1.676-.995-3.022-1.051-3.638-1.051-.616 0-2.486.056-3.48 1.43-.994.994-1.43 2.486-1.43 3.48.001.616.056 1.962 1.051 3.638 1.043 1.752 2.378 3.087 4.13 4.13z"/></svg>
 Enviar Pedido por WhatsApp
 </button>
 <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar Carrito</button>
 </div>
</div>

<script>
 // ============================================
 // CAMBIO 2/3: CONFIGURACIÓN DE SUPABASE
 // Se reemplaza el array fijo de productos
 // por una conexión a la base de datos Supabase.
 // Credenciales del proyecto "Reparadora"
 // ============================================
 const SUPABASE_URL = 'https://vwhuksxaczasugmyswdj.supabase.co';
 const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3aHVrc3hhY3phc3VnbXlzd2RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MDg0OTYsImV4cCI6MjA5NDk4NDQ5Nn0.ChMP3nlZQiMZ_O09eF6RgM6uD3WJ5Cb5W1FcQx42H-0';
 
 // Crear cliente de Supabase
 const { createClient } = supabase;
 const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
 
 // ============================================
 // CAMBIO 3/3: DATOS DESDE SUPABASE (NO ARRAY FIJO)
 // Antes: const productos = [{ id: 1, ... }, ...];
 // Ahora: productos se carga asíncronamente desde Supabase
 // ============================================
 let productos = []; // Inicialmente vacío, se llena desde la BD

 // Nueva función: Cargar productos desde Supabase
 async function cargarProductos() {
 const grid = document.getElementById('grid-productos');
 grid.innerHTML = '<p>Cargando productos desde la base de datos...</p>';
 
 try {
 // Consulta a la tabla 'productos'
 const { data, error } = await supabaseClient
 .from('productos')
 .select('*')
 .order('nombre'); // Ordenar alfabéticamente
 
 if (error) {
 console.error('Error al cargar productos:', error);
 grid.innerHTML = `<p style="color: red;">Error al cargar productos: ${error.message}</p>`;
 return;
 }
 
 if (data && data.length > 0) {
 productos = data; // Guardar productos en la variable global
 console.log('Productos cargados:', productos);
 renderizarTienda(); // Renderizar una vez cargados
 } else {
 grid.innerHTML = '<p>No hay productos disponibles en este momento.</p>';
 }
 } catch (err) {
 console.error('Error inesperado:', err);
 grid.innerHTML = '<p style="color: red;">Error inesperado al cargar productos.</p>';
 }
 }

 // 2. ESTADO (Cargar de LocalStorage)
 let carrito = JSON.parse(localStorage.getItem('mi_carrito_reparadora')) || [];

 // 3. GENERAR TIENDA (Mejorada: muestra más campos de la BD)
 function renderizarTienda() {
 const contenedor = document.getElementById('grid-productos');
 contenedor.innerHTML = '';
 
 if (productos.length === 0) {
 contenedor.innerHTML = '<p>No hay productos disponibles.</p>';
 return;
 }
 
 productos.forEach(prod => {
 contenedor.innerHTML += `
 <div class="producto-card">
 <h3>${prod.nombre}</h3>
 <p style="color: #7f8c8d; font-size: 0.9rem;">${prod.descripcion || ''}</p>
 <p class="precio">$${prod.precio.toLocaleString()}</p>
 <p style="color: #95a5a6; font-size: 0.85rem;">Stock: ${prod.stock || 0} | Categoría: ${prod.categoria || 'N/A'}</p>
 <button class="btn-agregar" onclick="agregarAlCarrito(${prod.id}, this)">
 Agregar al Carrito
 </button>
 </div>`;
 });
 }

 // 4. AGREGAR (Con lógica de agrupación y feedback)
 function agregarAlCarrito(idProducto, boton) {
 if (boton.classList.contains('agregado')) return;
 
 // Feedback visual
 boton.classList.add('agregado');
 const textoOriginal = boton.innerText;
 boton.innerText = "¡Agregado!";
 setTimeout(() => {
 boton.classList.remove('agregado');
 boton.innerText = textoOriginal;
 }, 1000);

 // Lógica de datos
 const existe = carrito.find(item => item.id === idProducto);
 if (existe) {
 existe.cantidad++;
 } else {
 const prodDB = productos.find(p => p.id === idProducto);
 if (prodDB) {
 carrito.push({ ...prodDB, cantidad: 1 });
 }
 }
 guardarYRenderizar();
 }

 // 5. ELIMINAR / RESTAR
 function reducirOCerrar(idProducto) {
 const item = carrito.find(item => item.id === idProducto);
 if (item) {
 if (item.cantidad > 1) {
 item.cantidad--;
 } else {
 carrito = carrito.filter(item => item.id !== idProducto);
 }
 guardarYRenderizar();
 }
 }

 // 6. VACIAR
 function vaciarCarrito() {
 if(confirm('¿Vaciar todo el carrito?')) {
 carrito = [];
 guardarYRenderizar();
 }
 }

 // 7. GUARDAR Y ACTUALIZAR VISTA
 function guardarYRenderizar() {
 localStorage.setItem('mi_carrito_reparadora', JSON.stringify(carrito));
 renderizarCarrito();
 }

 // 8. RENDERIZAR CARRITO
 function renderizarCarrito() {
 const contenedor = document.getElementById('lista-carrito-items');
 const totalSpan = document.getElementById('total-precio');
 contenedor.innerHTML = '';
 let total = 0;

 if (carrito.length === 0) {
 contenedor.innerHTML = '<p class="carrito-vacio">El carrito está vacío</p>';
 } else {
 carrito.forEach(item => {
 const subtotal = item.precio * item.cantidad;
 total += subtotal;
 contenedor.innerHTML += `
 <div class="carrito-item">
 <div class="carrito-info">
 <strong>${item.nombre}</strong>
 <span class="carrito-cantidad">${item.cantidad} x $${item.precio.toLocaleString()}</span>
 </div>
 <div style="display:flex; align-items:center;">
 <span class="carrito-subtotal">$${subtotal.toLocaleString()}</span>
 <button class="btn-eliminar" onclick="reducirOCerrar(${item.id})">
 ${item.cantidad > 1 ? '-' : '🗑️'}
 </button>
 </div>
 </div>
 `;
 });
 }
 totalSpan.textContent = total.toLocaleString();
 }

 // 9. ENVIAR A WHATSAPP
 function pedirPorWhatsApp() {
 if (carrito.length === 0) {
 alert("El carrito está vacío. Agrega productos antes de pedir.");
 return;
 }

 // Número del dueño
 const telefonoDueno = "56931050863";
 
 // Construir mensaje
 let mensaje = "Hola! Quiero hacer el siguiente pedido:\\n\\n";
 let total = 0;

 carrito.forEach(item => {
 const subtotal = item.precio * item.cantidad;
 total += subtotal;
 // Formato: "- 2x Zapatillas Urbanas: $100.000"
 mensaje += `- ${item.cantidad}x ${item.nombre}: $${subtotal.toLocaleString()}\\n`;
 });

 mensaje += `\\n*TOTAL: $${total.toLocaleString()}*`;
 mensaje += "\\n\\nQuedo atento a las coordenadas de pago y envío.";

 // Codificar para URL
 const mensajeCodificado = encodeURIComponent(mensaje);
 
 // Abrir WhatsApp
 const url = `https://wa.me/${telefonoDueno}?text=${mensajeCodificado}`;
 window.open(url, '_blank');
 }

 // ============================================
 // INICIALIZACIÓN (CAMBIO: se llama a cargarProductos)
 // ============================================
 cargarProductos(); // Cargar desde Supabase
 renderizarCarrito(); // Renderizar carrito (puede tener datos de localStorage)
</script>
</body>
</html>
